[CommonSettings]
SourcePath=Content/Localization/BetterServerListFilters
DestinationPath=Content/Localization/BetterServerListFilters
ManifestName=BetterServerListFilters.manifest
ArchiveName=BetterServerListFilters.archive
NativeCulture=en
CulturesToGenerate=en
CulturesToGenerate=de

[GatherTextStep0]
CommandletClass=GatherTextFromAssets
IncludePathFilters=%LOCPROJECTROOT%Content/_MoreServerListFilters/Text*
ExcludePathFilters=Content/Localization/*
ExcludePathFilters=Content/L10N/*
PackageFileNameFilters=*.umap
PackageFileNameFilters=*.uasset
ShouldExcludeDerivedClasses=false
ShouldGatherFromEditorOnlyData=false
SkipGatherCache=false

[GatherTextStep1]
CommandletClass=GenerateGatherManifest

[GatherTextStep2]
CommandletClass=GenerateGatherArchive

[GatherTextStep3]
CommandletClass=GenerateTextLocalizationReport
bWordCountReport=true
WordCountReportName=BetterServerListFilters.csv
bConflictReport=true
ConflictReportName=BetterServerListFilters_Conflicts.txt

